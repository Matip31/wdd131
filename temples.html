<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temples Photo Album</title>
    <meta name="description" content="This is a photo album for different temples. This page adjusts it's form to the width of the screen it is opened in">
    <meta name="author" content="Matias Ponce">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
</head>
<body>
    <header>
        <h2>Temple Album</h2>
        <div class="div-container">
            <button id="ham"></button>
            <nav>
                <ul class="navigation">
                    <li>
                        <a href="#">Home</a>
                    </li>
                    <li>
                        <a href="#">Old</a>
                    </li>
                    <li>
                        <a href="#">New</a>
                    </li>
                    <li>
                        <a href="#">Large</a>
                    </li>
                    <li>
                        <a href="#">Small</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <h1>Home</h1>
        <div class="container">
            <figure>
                <img src="images/bountiful-temple.jpeg" alt="Bountiful Temple">
                <figcaption>Bountiful, Utah</figcaption>
            </figure>
            <figure>
                <img src="images/buenos-aires-temple.jpeg" alt="Buenos Aires Temple">
                <figcaption>Buenos Aires, Argentina</figcaption>
            </figure>
            <figure>
                <img src="images/madrid-temple.jpeg" alt="Madrid Temple">
                <figcaption>Madrid, Spain</figcaption>
            </figure>
            <figure>
                <img src="images/monterrey-temple.jpeg" alt="Monterrey Temple">
                <figcaption>Monterrey, Mexico</figcaption>
            </figure>
            <figure>
                <img src="images/montevideo-temple.jpeg" alt="Montevideo Temple">
                <figcaption>Montevideo, Uruguay</figcaption>
            </figure>
            <figure>
                <img src="images/porto-alegre-temple.jpeg" alt="Porto Alegre Temple">
                <figcaption>Porto Alegre, Brazil</figcaption>
            </figure>
            <figure>
                <img src="images/provo-temple.jpeg" alt="Provo Temple">
                <figcaption>Provo, Utah</figcaption>
            </figure>
            <figure>
                <img src="images/recife-temple.jpeg" alt="Recife Temple">
                <figcaption>Recife, Brazil</figcaption>
            </figure>
            <figure>
                <img src="images/salvador-temple.jpeg" alt="Salvador Temple">
                <figcaption>Salvador, Brazil</figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <p>
            © <span id="currentyear"></span> Matias Ponce | Uruguay
        </p>
