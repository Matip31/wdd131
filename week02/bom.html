<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This app allows users to enter their favorite Book of Mormon chapters and display them in a list that updates automatically on the screen. Entries can then be deleted from the list.">
    <meta name="author" content="Matias Ponce">
    <title>Book Of Mormon Favorite Chapters</title>
    <link rel="stylesheet" href="styles/bom.css">
    <script src="scripts/bom.js" defer></script>

</head>
<body>
    <h1>📖 Book of Mormon - Top 10</h1>
<main>
	<label for="favchap">Enter Book and Chapter: </label>
	<input type="text" id="favchap" placeholder="Alma 5">
	<button type="submit">Add Chapter</button>
	<ul id="list"></ul>
</main>
</body>
</html>
